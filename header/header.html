<header class="site-header">
    
    <link rel="stylesheet" href="header/header.css">


        <div class="header-inner">
            <div class="brand-wrap">

                <img class="logo-placeholder" src="../header/cap.png" alt="Logótipo da Anita Nunes" aria-label="Logo placeholder" title="Logo placeholder">
                
                <a class="brand" href="../index.html" data-i18n="siteBrand">Anita</a>
 

            </div>


            <div class="control-group" role="group" aria-label="Theme and language selector">
                <div class="theme-switcher" role="group" aria-label="Theme selector">

                    <button class="theme-btn active" type="button" data-theme="light" aria-pressed="true" aria-label="Day mode">
                        <span class="theme-icon sun" aria-hidden="true">☀︎</span>
                    </button>

                    <button class="theme-btn" type="button" data-theme="dark" aria-pressed="false" aria-label="Night mode">
                        <span class="theme-icon moon" aria-hidden="true">☽</span>
                    </button>

                </div>

                <div class="lang-switcher" role="group" aria-label="Language selector">
                    <button class="lang-btn active" type="button" data-lang="pt" aria-pressed="true" data-i18n="langPt">PT</button>
                    <button class="lang-btn" type="button" data-lang="en" aria-pressed="false" data-i18n="langEn">EN</button>
                </div>
            </div>

        </div>
</header>

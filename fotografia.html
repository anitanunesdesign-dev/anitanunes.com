<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografia | Anita N.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="footer/footer.css">
</head>
<body data-i18n-root="page">
    <header class="site-header">
        <div class="header-inner">
            <div class="brand-wrap">
                <img class="logo-placeholder" src="images/logo-placeholder.png" alt="Logótipo da Anita Nunes" aria-label="Logo placeholder" title="Logo placeholder">
                <a class="brand" href="index.html" data-i18n="siteBrand">Anita</a>
            </div>

            <div class="control-group" role="group" aria-label="Theme and language selector">
                <div class="theme-switcher" role="group" aria-label="Theme selector">
                    <button class="theme-btn active" type="button" data-theme="light" aria-pressed="true" aria-label="Day mode">
                        <span class="theme-icon sun" aria-hidden="true">☀︎</span>
                    </button>
                    <button class="theme-btn" type="button" data-theme="dark" aria-pressed="false" aria-label="Night mode">
                        <span class="theme-icon moon" aria-hidden="true">🌙</span>
                    </button>
                </div>

                <div class="lang-switcher" role="group" aria-label="Language selector">
                    <button class="lang-btn active" type="button" data-lang="pt" aria-pressed="true" data-i18n="langPt">PT</button>
                    <button class="lang-btn" type="button" data-lang="en" aria-pressed="false" data-i18n="langEn">EN</button>
                </div>
            </div>
        </div>
    </header>

    <section class="landing">
        <div class="container landing-grid">
            <div class="landing-copy">
                <h1>ANITA</h1>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
            </div>
        </div>
    </section>

    <section class="books">
        <div class="container">
            <h2 data-i18n="fotografiaTitle">FOTOGRAFIA</h2>
            <div class="books-grid">
                <a href="#item-1" id="item-1" class="book-card">
                    <h3>FOTOGRAFIA 1</h3>
                    <img class="main-img" src="https://placehold.co/700x500/3D2F2F/FFFFFF?text=Foto+1" alt="Placeholder da fotografia 1">
                    <img class="hover-img" src="https://placehold.co/700x500/4E3F3F/FFFFFF?text=Foto+1" alt="Placeholder da fotografia 1">
                    <div class="overlay"></div>
                </a>
                <a href="#item-2" id="item-2" class="book-card">
                    <h3>FOTOGRAFIA 2</h3>
                    <img class="main-img" src="https://placehold.co/700x500/4D3B2F/FFFFFF?text=Foto+2" alt="Placeholder da fotografia 2">
                    <img class="hover-img" src="https://placehold.co/700x500/5E4B3F/FFFFFF?text=Foto+2" alt="Placeholder da fotografia 2">
                    <div class="overlay"></div>
                </a>
                <a href="#item-3" id="item-3" class="book-card">
                    <h3>FOTOGRAFIA 3</h3>
                    <img class="main-img" src="https://placehold.co/700x500/6D4F3F/FFFFFF?text=Foto+3" alt="Placeholder da fotografia 3">
                    <img class="hover-img" src="https://placehold.co/700x500/7E5F4F/FFFFFF?text=Foto+3" alt="Placeholder da fotografia 3">
                    <div class="overlay"></div>
                </a>
                <a href="#item-4" id="item-4" class="book-card">
                    <h3>FOTOGRAFIA 4</h3>
                    <img class="main-img" src="https://placehold.co/700x500/8F6F5F/111111?text=Foto+4" alt="Placeholder da fotografia 4">
                    <img class="hover-img" src="https://placehold.co/700x500/9F7F6F/111111?text=Foto+4" alt="Placeholder da fotografia 4">
                    <div class="overlay"></div>
                </a>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="footer/load-footer.js"></script>
    <script src="script.js"></script>
</body>
</html>

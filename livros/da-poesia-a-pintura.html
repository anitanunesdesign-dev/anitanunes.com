<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DA POESIA À PINTURA | Anita N.</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="livros_indivi.css">
    <link rel="stylesheet" href="livros_detail.css">
    <link rel="stylesheet" href="../footer/footer.css">
</head>
<body class="book-detail-page" data-i18n-root="page">
    <header class="site-header">
        <div class="header-inner">
            <div class="brand-wrap">
                <img class="logo-placeholder" src="../images/logo-placeholder.png" alt="Logótipo da Anita Nunes" aria-label="Logo placeholder" title="Logo placeholder">
                <a class="brand" href="../index.html" data-i18n="siteBrand">Anita</a>
            </div>

            <div class="control-group" role="group" aria-label="Theme and language selector">
                <div class="theme-switcher" role="group" aria-label="Theme selector">
                    <button class="theme-btn active" type="button" data-theme="light" aria-pressed="true" aria-label="Day mode">
                        <span class="theme-icon sun" aria-hidden="true">☀︎</span>
                    </button>
                    <button class="theme-btn" type="button" data-theme="dark" aria-pressed="false" aria-label="Night mode">
                        <span class="theme-icon moon" aria-hidden="true">🌙</span>
                    </button>
                </div>

                <div class="lang-switcher" role="group" aria-label="Language selector">
                    <button class="lang-btn active" type="button" data-lang="pt" aria-pressed="true" data-i18n="langPt">PT</button>
                    <button class="lang-btn" type="button" data-lang="en" aria-pressed="false" data-i18n="langEn">EN</button>
                </div>
            </div>
        </div>
    </header>

    <section class="landing book-detail-landing" style="--book-hero-image: url('../images/poesiapintura_frente.jpg');">
        <div class="container landing-grid">
            <div class="landing-copy book-detail-copy">
                <a class="back-link" href="livros.html">Livros</a>
                <h1>DA POESIA À PINTURA</h1>
            </div>
        </div>
    </section>

    <section class="books book-detail-gallery">
        <div class="container">
            <h2>IMAGENS DO LIVRO</h2>

            <div class="books-grid">
                <a href="#" class="book-card">
                    <h3>Imagem 1</h3>
                    <div class="overlay"></div>

                    <img class="main-img" src="https://placehold.co/900x650/4A4A4A/FFFFFF?text=Imagem+1" alt="Placeholder da imagem 1">
                </a>

                <a href="#" class="book-card">
                    <h3>Imagem 2</h3>
                    <div class="overlay"></div>

                    <img class="main-img" src="https://placehold.co/900x650/6B6B6B/FFFFFF?text=Imagem+2" alt="Placeholder da imagem 2">
                </a>

                <a href="#" class="book-card">
                    <h3>Imagem 3</h3>
                    <div class="overlay"></div>

                    <img class="main-img" src="https://placehold.co/900x650/8A8A8A/FFFFFF?text=Imagem+3" alt="Placeholder da imagem 3">
                </a>

                <a href="#" class="book-card">
                    <h3>Imagem 4</h3>
                    <div class="overlay"></div>

                    <img class="main-img" src="https://placehold.co/900x650/AAAAAA/111111?text=Imagem+4" alt="Placeholder da imagem 4">
                </a>
            </div>
        </div>
    </section>

    <div id="footer-placeholder" data-footer-src="../footer/footer.html" data-footer-prefix="../"></div>
    <script src="../footer/load-footer.js"></script>
    <script src="../script.js"></script>
</body>
</html>
